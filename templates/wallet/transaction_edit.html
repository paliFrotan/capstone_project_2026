<!-- prettier-ignore -->
{% extends "base.html" %} 
{% block title %}WiseWallet - Edit Transaction
{% endblock %} 
{% block content %}

<div class="d-flex align-items-center justify-content-between gap-2 mb-3">
    <div>
        <h1 class="h3 mb-1">Edit transaction</h1>
        <div class="text-white-50">
            {{ tx.kind }} · {{ tx.date|date:"Y-m-d" }}
        </div>
    </div>

    <a
        class="btn btn-sm btn-outline-light"
        href="{% url 'month_transactions' %}?month={{ request.GET.month }}&page={{ request.GET.page }}"
        >Back</a
    >
</div>

<div class="glass p-3 rounded-4" style="max-width: 720px">
    <form method="post">
        {% csrf_token %}

        <div class="mb-2">
            <label class="form-label">Date</label>
            {{ form.date }}
        </div>

        <div class="mb-2">
            <label class="form-label">Description</label>
            {{ form.description }}
        </div>

        <div class="mb-3">
            <label class="form-label">Amount (£)</label>
            {{ form.amount_gbp }}
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-ww" type="submit">Save</button>
            <a
                class="btn btn-outline-light"
                href="{% url 'month_transactions' %}?month={{ request.GET.month }}&page={{ request.GET.page }}"
                >Cancel</a
            >
        </div>
    </form>
</div>

{% endblock %}
