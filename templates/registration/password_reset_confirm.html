{% extends "base.html" %} {% block content %}
<div class="container py-5" style="max-width: 500px">
    <h2 class="mb-4 text-center">Set a new password</h2>

    {% if validlink %}
    <p class="text-muted text-center">Enter your new password below.</p>

    <form method="post">
        {% csrf_token %} {{ form.as_p }}

        <button class="btn btn-primary w-100 mt-3">Change password</button>
    </form>
    {% else %}
    <p class="text-danger text-center">
        This password reset link is invalid or has expired.
    </p>

    <div class="text-center mt-4">
        <a href="{% url 'password_reset' %}" class="btn btn-secondary w-100">
            Request a new link
        </a>
    </div>
    {% endif %}
</div>
{% endblock %}
