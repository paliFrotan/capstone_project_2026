{% extends "base.html" %} {% block content %}
<div
    class="d-flex justify-content-center align-items-center"
    style="min-height: 30vh"
>
    <div class="glass p-4 rounded-4" style="max-width: 400px; width: 100%">
        <h2 class="mb-3 text-center">Reset your password</h2>
        <p class="text-white-50 text-center mb-4">
            Enter your email and we’ll send you instructions if your account has
            an email set.
        </p>
        {% if error_message %}
        <div class="alert alert-danger text-center">{{ error_message }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email">Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                    value="{{ email|default:'' }}"
                />
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'login' %}" class="btn btn-ww">Cancel</a>
                <button class="btn btn-ww" type="submit">
                    Send reset link
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
